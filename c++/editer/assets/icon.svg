<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A5FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
  
  <!-- Italic E letter -->
  <g transform="translate(128, 128)" filter="url(#shadow)">
    <!-- Main E shape with italic slant -->
    <path d="
      M -35,-70
      L 50,-70
      L 45,-50
      L -20,-50
      L -30,-5
      L 35,-5
      L 30,15
      L -35,15
      L -45,60
      L 40,60
      L 35,80
      L -50,80
      Z
    " fill="url(#letterGradient)" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Highlight effect -->
    <path d="
      M -30,-65
      L 45,-65
      L 42,-55
      L -25,-55
      Z
    " fill="#FFFFFF" opacity="0.3"/>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.2"/>
</svg>
